services:
  backend:
    build: ./backend
    environment:
      PORT: "3000"
      LIVEKIT_URL: "http://livekit:7880"
      LIVEKIT_API_KEY: "${LIVEKIT_API_KEY:-devkey}"
      LIVEKIT_API_SECRET: "${LIVEKIT_API_SECRET:-secret}"
    ports:
      - "3000:3000"
    volumes:
      - ./backend:/app
      - /app/node_modules

  frontend:
    build: ./frontend
    environment:
      VITE_BACKEND_WS_URL: "${VITE_BACKEND_WS_URL:-ws://localhost:3000}"
      VITE_LIVEKIT_URL: "${VITE_LIVEKIT_URL:-ws://localhost:7880}"
      VITE_LIVEKIT_TOKEN_API_URL: "${VITE_LIVEKIT_TOKEN_API_URL:-http://localhost:3000/api/livekit/token}"
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules

  agent:
    build: ./agent
    environment:
      LIVEKIT_URL: "ws://livekit:7880"
      LIVEKIT_API_KEY: "devkey"
      LIVEKIT_API_SECRET: "secret"
    volumes:
      - ./agent:/app
    depends_on:
      - livekit

  livekit:
    image: livekit/livekit-server:latest
    command: --dev --bind 0.0.0.0 --node-ip ${LIVEKIT_NODE_IP:-127.0.0.1}
    ports:
      - "7880:7880"
      - "7881:7881"
      - "7882:7882/udp"
